[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm install"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/deklaracja"
  to = "/assets/deklaracja-rodo.pdf"
  status = 302

[[redirects]]
  from = "/deklaracja-rodo.pdf"
  to = "/assets/deklaracja-rodo.pdf"
  status = 302

[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/strefa.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[redirects]]
  from = "/strefa"
  to = "/strefa.html"
  status = 301

[[redirects]]
  from = "/rodo"
  to = "/rodo.html"
  status = 301

[[redirects]]
  from = "/polityka-prywatnosci"
  to = "/rodo.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
