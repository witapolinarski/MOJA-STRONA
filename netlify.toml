[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm install"

[functions]
  node_bundler = "esbuild"

[functions."member-dues"]
  timeout = 26

[[redirects]]
  from = "/deklaracja"
  to = "/assets/deklaracja-rodo.pdf"
  status = 302

[[redirects]]
  from = "/deklaracja-rodo.pdf"
  to = "/assets/deklaracja-rodo.pdf"
  status = 302

# Stare ścieżki WordPress (strzelamy.org.pl) — zachowane po przełączeniu DNS na Netlify
[[redirects]]
  from = "/wp-content/uploads/2024/04/STATUT-SAGITTARIUS.pdf"
  to = "/assets/statut-sagittarius.pdf"
  status = 301

[[redirects]]
  from = "/statut"
  to = "/assets/statut-sagittarius.pdf"
  status = 302

[[redirects]]
  from = "/statut-sagittarius.pdf"
  to = "/assets/statut-sagittarius.pdf"
  status = 302

[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/strefa.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/strefa.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[redirects]]
  from = "/strefa"
  to = "/strefa.html"
  status = 301

[[redirects]]
  from = "/rodo"
  to = "/rodo.html"
  status = 301

[[redirects]]
  from = "/polityka-prywatnosci"
  to = "/rodo.html"
  status = 301

[[redirects]]
  from = "/mundurowi"
  to = "/oferta-dla-mundurowych.html"
  status = 301

[[redirects]]
  from = "/oferta-dla-mundurowych"
  to = "/oferta-dla-mundurowych.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
