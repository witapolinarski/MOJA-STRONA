[build]
  publish = "."

# Formularz membership jest w index.html i forms.html (parser Netlify przy deployu)

[[redirects]]
  from = "/deklaracja"
  to = "/#czlonkostwo"
  status = 302

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
