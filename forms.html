<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <title>Forms</title>
  </head>
  <body>
    <!-- Statyczna kopia formularza dla parsera Netlify Forms przy deployu -->
    <form name="membership" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="membership">
      <input type="hidden" name="subject" value="[Sagittarius] Nowy wniosek członkostwa">
      <input name="bot-field">
      <input name="application-code">
      <input name="name">
      <input name="email">
      <input name="phone">
      <input name="address">
      <input name="type">
      <input name="section">
      <input name="recommender">
      <input name="exempt">
      <input name="statute">
      <input name="rodo">
      <input name="submitted-at">
    </form>
  </body>
</html>
