<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Panel administratora | Sagittarius</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin.css">
  </head>
  <body class="admin-body">
    <main class="admin-shell" id="admin-app">
      <section class="admin-login" id="admin-login">
        <div class="admin-login-card">
          <p class="eyebrow">TMS „Sagittarius”</p>
          <h1>Panel zarządu</h1>
          <p class="admin-lead">Witold Apolinarski — weryfikacja wniosków członkowskich i potwierdzeń wpłat.</p>
          <form id="login-form">
            <label>
              Hasło administratora
              <input type="password" id="admin-password" required autocomplete="current-password">
            </label>
            <button type="submit" class="button primary">Zaloguj jako Witold Apolinarski</button>
            <p class="form-note" id="login-note"></p>
          </form>
        </div>
      </section>

      <section class="admin-panel hidden" id="admin-panel">
        <header class="admin-header">
          <div>
            <p class="eyebrow">Panel zarządu TMS „Sagittarius”</p>
            <h1>Wnioski do zatwierdzenia</h1>
            <p class="admin-user" id="admin-user" hidden></p>
          </div>
          <div class="admin-header-actions">
            <select id="status-filter" aria-label="Filtr statusu">
              <option value="pending">Oczekujące</option>
              <option value="approved">Zatwierdzone</option>
              <option value="rejected">Odrzucone</option>
              <option value="all">Wszystkie</option>
            </select>
            <button type="button" class="button secondary" id="refresh-button">Odśwież</button>
            <button type="button" class="button dark" id="logout-button">Wyloguj</button>
          </div>
        </header>

        <p class="admin-summary" id="admin-summary">Ładowanie wniosków…</p>
        <div class="admin-list" id="admin-list"></div>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
